<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>母亲节祝福</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #fancy-card {
      max-width: 400px;
      margin: 20px auto;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    img {
      max-width: 100%;
    }

    h2 {
      color: #ff8080;
    }

    button {
      padding: 10px 20px;
      background-color: #ff8080;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="fancy-card">
    <img src="flower.jpg" alt="鲜花">
    <h2>母亲节快乐！</h2>
    <p>亲爱的妈妈，谢谢您一直以来的关爱和支持。您的爱是我生命中最宝贵的礼物，我会永远珍惜。</p>
  </div>
</body>
</html>
