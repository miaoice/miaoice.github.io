<!DOCTYPE html>
<html>
<head>
    <title>WebSocket连接示例</title>
    <style>
        #messageBox {
            width: 100%;
            height: 200px;
            resize: none;
            background-color: #f5f5f5;
            border: none;
            overflow: auto;
        }
    </style>
    <script>
        var socket;

        function connectWebSocket() {
            // 创建WebSocket连接
            socket = new WebSocket('ws://your-websocket-server-url');

            // 监听WebSocket连接打开事件
            socket.onopen = function() {
                console.log('WebSocket connected');
            };

            // 监听WebSocket收到消息事件
            socket.onmessage = function(event) {
                var message = event.data;
                console.log('Message received: ' + message);

                // 显示接收到的消息
                showMessage(message);
            };

            // 监听WebSocket连接关闭事件
            socket.onclose = function() {
                console.log('WebSocket connection closed');
            };
        }

        function showMessage(message) {
            var messageBox = document.getElementById('messageBox');
            messageBox.value += message + '\n';
            messageBox.scrollTop = messageBox.scrollHeight; // 自动滚动到底部
        }
    </script>
</head>
<body>
    <h1>WebSocket连接示例</h1>
    <button type="button" onclick="connectWebSocket()">连接到WebSocket服务器</button>
    <br /><br />
    <textarea id="messageBox" readonly></textarea>
</body>
</html>
