
<!DOCTYPE html>
<html>
<head>
    <title>cwc</title>
    <script type="text/javascript">
        function checkPassword() {
            var correctPassword = "answer"; // 替换为实际的密码
            var inputPassword = document.getElementById("passwordInput").value;
            if (inputPassword === correctPassword) {
                window.location.href = "answer.html"; // 替换为正确的跳转网址
            } else {
                alert("密码错误，请联系Miaoice");
            }
        }
    </script>
</head>
<body>
    <label for="passwordInput">请输入密码：</label>
    <input type="password" id="passwordInput" name="passwordInput">
    <button onclick="checkPassword()">确定</button>
</body>
</html>
